name: Validate metadata

on:
  pull_request:
    paths:
      - "examples/devices/**/metadata.md"
      - "METADATA_TEMPLATE.md"
      - "tools/validate-metadata/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/validate-metadata.yml"
  push:
    branches:
      - main
    paths:
      - "examples/devices/**/metadata.md"
      - "METADATA_TEMPLATE.md"
      - "tools/validate-metadata/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/validate-metadata.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate metadata.md
        run: pnpm metadata:validate
