# アーカイブ済みリポジトリのため、定期実行（schedule）は停止しています。
# workflow_dispatch は fork 利用者向けの手動実行用として残しています。
name: Sync upstream examples

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstreams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync upstream examples
        run: pnpm sync:upstreams

      - name: Generate catalog
        run: pnpm catalog:generate

      - name: Detect duplicated devices
        run: pnpm duplicates:detect

      - name: Validate metadata
        run: pnpm metadata:validate

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-upstream-examples
          delete-branch: true
          title: "chore: sync upstream examples"
          commit-message: "chore: sync upstream examples"
          body: |
            ## Summary

            Upstream CHIRIMEN examples were synchronized automatically.

            ## Generated files

            - `generated/upstreams/**`
            - `generated/reports/**`
            - `catalog/**`（examples.json, platforms.json, device-example-map.json, upstreams.json）

            ## Review points

            - Check new or changed upstream examples
            - Check duplicated device reports
            - Check missing metadata reports
            - Check missing device-dashboard-link reports
            - Check catalog changes

            This PR was generated by GitHub Actions.
          labels: |
            upstream-sync
            automated
